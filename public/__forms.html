<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netlify Forms Placeholder</title>
</head>
<body>
    <!-- This file contains the form definitions for Netlify's build-time detection. -->

    <form name="contact" data-netlify="true" hidden>
        <input type="text" name="fullName" />
        <input type="text" name="phoneNumber" />
        <textarea name="message"></textarea>
    </form>

    <form name="cargo-quote" data-netlify="true" hidden>
        <input type="text" name="originCountry" />
        <input type="text" name="destinationCountry" />
        <input type="text" name="serviceType" />
        <input type="text" name="weight" />
        <input type="tel" name="phone" />
        <input type="email" name="email" />
        <textarea name="message"></textarea>
    </form>

    <form name="cargo-enquiry" data-netlify="true" hidden>
        <input type="text" name="country" />
        <input type="text" name="fullName" />
        <input type="email" name="email" />
        <input type="tel" name="phone" />
        <textarea name="message"></textarea>
    </form>
</body>
</html>
